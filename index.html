<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wavz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --accent: #38bdf8;
            --error: #f87171;
            --tab-inactive: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 15px;
            margin: 0;
            text-align: center;
        }

        /* شاشة تسجيل الدخول */
        #loginOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
        }

        /* تنسيق الأزرار والمدخلات */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            text-align: center;
        }

        button {
            cursor: pointer;
            transition: 0.3s;
        }

        .primary-btn {
            background: var(--accent);
            color: #0f172a;
            font-weight: bold;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            width: 100%;
        }

        /* المحتوى الرئيسي (مخفي قبل الدخول) */
        #mainContent { display: none; }

        /* باقي تنسيقات السيستم السابق */
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .tab-btn { padding: 12px 20px; border-radius: 8px; border: none; background: var(--tab-inactive); color: #94a3b8; flex: 1; max-width: 200px; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: #0f172a; }
        .search-container { display: flex; gap: 10px; max-width: 500px; margin: 0 auto 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border-right: 6px solid var(--accent); text-align: right; max-width: 500px; margin: 15px auto; animation: fadeIn 0.5s; }
        .info-row { display: flex; justify-content: space-between; border-bottom: 1px solid #334155; padding: 8px 0; }
        .label { color: #94a3b8; }
        .loader { color: var(--accent); display: none; margin-bottom: 15px; }
        .error-msg { color: var(--error); display: none; margin-top: 10px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h3>تسجيل دخول الموظفين</h3>
        <p style="color: #94a3b8; font-size: 0.9rem;">يرجى إدخال كلمة المرور للمتابعة</p>
        <input type="password" id="passInput" placeholder="كلمة المرور">
        <button class="primary-btn" onclick="checkAuth()">دخول</button>
        <div id="loginError" class="error-msg">كلمة المرور غير صحيحة!</div>
    </div>
</div>

<div id="mainContent">
    <header>
        <h2 id="mainTitle">استعلام البلاغات</h2>
        <div id="loadingStatus" class="loader">جاري جلب البيانات...</div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('reports', this)">Issues</button>
        <button class="tab-btn" onclick="switchTab('lost', this)">بدل فاقد</button>
    </div>

    <div class="search-container">
        <input type="number" id="idInput" placeholder="أدخل الرقم القومي هنا...">
        <button id="searchBtn" class="primary-btn" style="width: auto;" onclick="handleSearch()">بحث</button>
    </div>

    <div id="errorMessage" class="error-msg">البيانات غير متوفرة</div>
    <div id="resultArea"></div>
</div>

<script>
    const sheetId = '1EcVR1-toOMYuQahiFYWJXLx28rwBud1Pnws6WpMn7EY';
    
    // روابط الشيتات
    const urls = {
        reports: `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Sheet1`,
        lost: `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Lost`,
        auth: `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Auth`
    };

    let currentTab = 'reports';

    // 1. وظيفة التحقق من الباسورد
    async function checkAuth() {
        const passInput = document.getElementById('passInput').value;
        const errorMsg = document.getElementById('loginError');
        
        if (!passInput) return;

        try {
            // جلب بيانات شيت Auth بلحظتها
            const response = await fetch(`${urls.auth}&t=${Date.now()}`);
            const csvText = await response.text();
            
            Papa.parse(csvText, {
                header: true,
                complete: function(results) {
                    const passwords = results.data.map(row => String(row.Password).trim());
                    
                    if (passwords.includes(passInput.trim())) {
                        document.getElementById('loginOverlay').style.display = 'none';
                        document.getElementById('mainContent').style.display = 'block';
                    } else {
                        errorMsg.style.display = 'block';
                    }
                }
            });
        } catch (e) {
            alert("فشل الاتصال بالسيرفر للتحقق من الصلاحية");
        }
    }

    // 2. وظائف السيستم الأساسية
    function switchTab(tab, btn) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('mainTitle').innerText = tab === 'reports' ? 'استعلام البلاغات' : 'استعلام بدل الفاقد';
        document.getElementById('resultArea').innerHTML = '';
        document.getElementById('errorMessage').style.display = 'none';
        document.getElementById('idInput').value = '';
    }

    async function handleSearch() {
        const inputVal = document.getElementById('idInput').value.trim();
        const loader = document.getElementById('loadingStatus');
        if (!inputVal) return;

        loader.style.display = 'block';
        document.getElementById('errorMessage').style.display = 'none';
        document.getElementById('resultArea').innerHTML = '';

        try {
            const res = await fetch(`${urls[currentTab]}&t=${Date.now()}`);
            const text = await res.text();
            
            Papa.parse(text, {
                header: true,
                complete: function(results) {
                    const citizen = results.data.find(item => String(item.ID).trim() === inputVal);
                    loader.style.display = 'none';
                    
                    if (citizen) {
                        renderCard(citizen);
                    } else {
                        document.getElementById('errorMessage').style.display = 'block';
                    }
                }
            });
        } catch (e) {
            loader.innerText = "خطأ في جلب البيانات";
        }
    }

    function renderCard(item) {
        let content = '';
        if (currentTab === 'reports') {
            content = `
                <div class="info-row"><span class="label">الاسم:</span><span class="val">${item.Name || '-'}</span></div>
                <div class="info-row"><span class="label">رقم التيكت:</span><span class="val">${item.Ticket || '-'}</span></div>
                <div class="info-row"><span class="label">الفرع:</span><span class="val">${item.Branch || '-'}</span></div>
                <div class="info-row" style="border:none"><span class="label">ملاحظات:</span><span class="val">${item.comment || '-'}</span></div>
            `;
        } else {
            content = `
                <div class="info-row"><span class="label">الاسم:</span><span class="val">${item.Name || '-'}</span></div>
                <div class="info-row"><span class="label">الموبايل:</span><span class="val">${item.Phone || '-'}</span></div>
                <div class="info-row"><span class="label">التاريخ:</span><span class="val">${item.Date || '-'}</span></div>
            `;
        }
        document.getElementById('resultArea').innerHTML = `<div class="card">${content}</div>`;
    }

    // دعم زر Enter في الباسورد والبحث
    document.getElementById('passInput').addEventListener('keypress', e => { if(e.key === 'Enter') checkAuth(); });
    document.getElementById('idInput').addEventListener('keypress', e => { if(e.key === 'Enter') handleSearch(); });

</script>
</body>
</html>
