<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الاستعلام المتكامل - تحديث لحظي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --accent: #38bdf8;
            --error: #f87171;
            --tab-inactive: #334155;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 15px;
            margin: 0;
            text-align: center;
        }
        
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .tab-btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background: var(--tab-inactive);
            color: #94a3b8;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            max-width: 200px;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: var(--accent);
            color: #0f172a;
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        
        #idInput {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #334155;
            background: var(--card-bg);
            color: white;
            font-size: 1.1rem;
            outline: none;
        }
        
        #searchBtn {
            padding: 0 25px;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border-right: 6px solid var(--accent);
            text-align: right;
            max-width: 500px;
            margin: 15px auto;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .info-row {
            margin: 10px 0;
            border-bottom: 1px solid #334155;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .label { color: #94a3b8; font-size: 0.85rem; }
        .val { font-weight: bold; }

        .error-msg {
            color: var(--error);
            padding: 15px;
            display: none;
        }
        
        .loader { 
            color: var(--accent); 
            display: none; 
            margin-bottom: 15px; 
            font-size: 0.9rem; 
            font-style: italic;
        }
    </style>
</head>
<body>

<header>
    <h2 id="mainTitle">استعلام البلاغات</h2>
    <div id="loadingStatus" class="loader">جاري جلب البيانات من السيرفر...</div>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('reports', this)">Issues</button>
    <button class="tab-btn" onclick="switchTab('lost', this)">بدل فاقد</button>
</div>

<div class="search-container">
    <input type="number" id="idInput" placeholder="أدخل الرقم القومي هنا...">
    <button id="searchBtn" onclick="handleSearch()">بحث</button>
</div>

<div id="errorMessage" class="error-msg">بيانات هذا المواطن غير متوفرة حالياً</div>
<div id="resultArea"></div>

<script>
    // معرف الشيت الخاص بك
    const sheetId = '1EcVR1-toOMYuQahiFYWJXLx28rwBud1Pnws6WpMn7EY';
    
    // روابط جلب البيانات - نستخدم نظام التصدير المباشر لضمان السرعة
    const urls = {
        reports: `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Sheet1`,
        lost: `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Lost`
    };

    let currentTab = 'reports';

    // تبديل التبويبات
    function switchTab(tab, btn) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        document.getElementById('mainTitle').innerText = tab === 'reports' ? 'استعلام البلاغات' : 'استعلام بدل الفاقد';
        document.getElementById('resultArea').innerHTML = '';
        document.getElementById('errorMessage').style.display = 'none';
        document.getElementById('idInput').value = '';
    }

    // الدالة الأساسية: جلب البيانات ثم البحث فيها فوراً
    async function handleSearch() {
        const inputVal = document.getElementById('idInput').value.trim();
        const resultArea = document.getElementById('resultArea');
        const errorMsg = document.getElementById('errorMessage');
        const loader = document.getElementById('loadingStatus');

        if (!inputVal) {
            alert("يرجى إدخال الرقم القومي أولاً");
            return;
        }

        // تحضير الواجهة
        resultArea.innerHTML = '';
        errorMsg.style.display = 'none';
        loader.style.display = 'block';

        try {
            /* إضافة t=Date.now() هي السر! 
               تخبر جوجل أننا نريد نسخة جديدة تماماً وليس نسخة قديمة مخزنة
            */
            const finalUrl = `${urls[currentTab]}&t=${Date.now()}`;
            
            const response = await fetch(finalUrl);
            const csvData = await response.text();

            Papa.parse(csvData, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    // البحث عن المواطن في البيانات المجلوبة حالاً
                    const citizen = data.find(item => String(item.ID).trim() === inputVal);

                    loader.style.display = 'none';

                    if (citizen) {
                        if (currentTab === 'reports') {
                            renderReportCard(citizen);
                        } else {
                            renderLostCard(citizen);
                        }
                    } else {
                        errorMsg.style.display = 'block';
                    }
                }
            });
        } catch (error) {
            console.error("Fetch Error:", error);
            loader.innerText = "حدث خطأ أثناء الاتصال بالسيرفر";
        }
    }

    function renderReportCard(item) {
        document.getElementById('resultArea').innerHTML = `
            <div class="card">
                <div class="info-row"><span class="label">الاسم:</span><span class="val">${item.Name || '-'}</span></div>
                <div class="info-row"><span class="label">نوع المشكلة:</span><span class="val">${item.Type || '-'}</span></div>
                <div class="info-row"><span class="label">رقم التيكت:</span><span class="val">${item.Ticket || '-'}</span></div>
                <div class="info-row"><span class="label">الفرع:</span><span class="val">${item.Branch || '-'}</span></div>
                <div class="info-row"><span class="label">التاريخ:</span><span class="val">${item.Date || '-'}</span></div>
                <div class="info-row" style="border:none"><span class="label">ملاحظات:</span><span class="val">${item.comment || '-'}</span></div>
            </div>
        `;
    }

    function renderLostCard(item) {
        document.getElementById('resultArea').innerHTML = `
            <div class="card" style="border-right-color: #facc15">
                <div class="info-row"><span class="label">الاسم:</span><span class="val">${item.Name || '-'}</span></div>
                <div class="info-row"><span class="label">الرقم القومي:</span><span class="val">${item.ID || '-'}</span></div>
                <div class="info-row"><span class="label">الموبايل:</span><span class="val">${item.Phone || '-'}</span></div>
                <div class="info-row"><span class="label">الفرع:</span><span class="val">${item.Branch || '-'}</span></div>
                <div class="info-row"><span class="label">التاريخ:</span><span class="val">${item.Date || '-'}</span></div>
                <div class="info-row" style="border:none"><span class="label">ملاحظات:</span><span class="val">${item.Comment || item.comment || '-'}</span></div>
            </div>
        `;
    }

    // بحث عند ضغط Enter
    document.getElementById('idInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSearch();
    });
</script>

</body>
</html>
